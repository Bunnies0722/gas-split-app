<!-- @dsCard group="Layout" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
</head>
<body>
<div class="ds-preview">
  <div class="card">
    <h2>🚗 車・人数の情報</h2>
    <label for="fuelType">油種</label>
    <select id="fuelType">
      <option>レギュラー</option>
      <option>ハイオク</option>
      <option>軽油</option>
    </select>
    <label for="people">割り勘する人数</label>
    <input id="people" type="number" min="1" step="1" placeholder="例：4">
  </div>
</div>
</body>
</html>
