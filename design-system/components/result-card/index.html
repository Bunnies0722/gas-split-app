<!-- @dsCard group="Layout" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Result Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13.5px;
    color: var(--text-secondary);
    padding: 9px 0;
    border-bottom: 1px solid var(--card-border);
  }
  .result-row:last-of-type { border-bottom: none; }
  .result-row .value { font-weight: 700; color: var(--text-primary); font-size: 15px; }
  .result-row.highlight .value { color: var(--accent); font-size: 20px; }
  .success-btn { background: var(--success); margin-top: 10px; }
  .success-btn:hover { background: #4a6450; }
</style>
</head>
<body>
<div class="ds-preview">
  <div class="card">
    <h2>💰 精算結果</h2>
    <div class="result-row"><span>総走行距離</span><span class="value">112.4km</span></div>
    <div class="result-row"><span>合計ガソリン代</span><span class="value">1,275円</span></div>
    <div class="result-row highlight"><span>1人あたり</span><span class="value">319円</span></div>

    <label for="lineText">精算用テキスト（LINEなどに貼れます）</label>
    <textarea id="lineText" readonly rows="6" style="line-height:1.6;">🚗 ガソリン代の精算
東京駅 → 富士急ハイランド
距離：112.4km
油種：レギュラー
推定使用量：7.5L
合計：1,275円
人数：4人
--------------------
1人あたり：319円
お願いします🙏</textarea>
    <button type="button" class="success-btn">📋 精算用テキストをコピー</button>
    <div style="text-align:center; font-size:12px; color:var(--success); height:16px; margin-top:6px; font-weight:600;">コピーしました！</div>
  </div>
</div>
</body>
</html>
